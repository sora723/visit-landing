[build]
  command = "node scripts/log-build-env.mjs && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # APPS_SCRIPT_URL, SHEET_SITE_CODE → Netlify UI → Environment variables 에 설정 (Scopes: All)
  # .env.local 은 gitignore — Netlify에 자동 반영되지 않음
